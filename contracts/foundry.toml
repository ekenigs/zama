[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
local = "http://127.0.0.1:8545"

[dependencies]
"@openzeppelin-confidential-contracts" = { version = "0.5.1", git = "https://github.com/OpenZeppelin/openzeppelin-confidential-contracts.git", rev = "v0.5.1" }
"@openzeppelin-contracts" = "5.1.0"
"@fhevm-solidity" = "0.11.1"
forge-fhevm = { version = "eba2324", git = "https://github.com/zama-ai/forge-fhevm.git", rev = "eba2324" }

[dependencies.forge-std]
version = "1.9.6"
url = "https://github.com/foundry-rs/forge-std.git"
